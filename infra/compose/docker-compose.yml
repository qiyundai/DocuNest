version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: docunest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  vector:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - '6333:6333'

  files:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: docunest
      MINIO_ROOT_PASSWORD: docunestsecret
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  queue:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - db
      - vector
      - queue
    ports:
      - '4000:4000'

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - queue
      - api

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - '3000:3000'

  proxy:
    image: caddy:latest
    ports:
      - '8443:8443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  db-data:
  qdrant-data:
  minio-data:
